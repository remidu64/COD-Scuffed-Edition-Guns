M200Intervention:
  Info:
    Weapon_Info_Display:
      Action_Bar:
        Message: "<gold>M200 Intervention «<ammo_left>/5»<reload><firearm_state>"
    Weapon_Item:
      Name: <gold>M200 Intervention
      Type: IRON_HORSE_ARMOR
      Custom_Model_Data: 3
      Lore:
      - <gold>Sniper Rifle  
    Weapon_Get_Mechanics:
    - Sound{sound=ENTITY_BAT_TAKEOFF, volume=1, pitch=1}
    Cancel:
      Drop_Item: true
      
  Trail:
    Distance_Between_Particles: 1.0
    Particle_Chooser: LOOP
    Particles:
      -  "Particle{particle=DUST_COLOR_TRANSITION, color=#FFFF00, fadeColor=#FF0000, repeatAmount=1, repeatInterval=1, alwaysShow=true, size=0.3, noise=0.02 0.02 0.02, count=2}"

  Shoot:
    Trigger:
      Main_Hand: right_click
    Projectiles_Per_Shot: 1
    Projectile_Speed: 1000
    Mechanics:
    - CustomSound{sound=intervention.shoot, volume=1}
    - Leap{speed=-0.5} @Source{offset=~0 0 1}
    Offsets:
      Vive:
        Right_Hand: ~0.0 0.1 0.45
        Left_Hand: ~0.0 0.1 0.45
      Right_Hand: ~0 0 0
      Left_Hand: ~0 0 0
    
  Projectile:
    Projectile_Settings:
      Type: INVISIBLE
      Gravity: 50
      Maximum_Travel_Distance: 400
      Size: 0.3
      
  Damage:
    Base_Damage: 25
    Armor_Damage: 1
    Head:
      Bonus_Damage: 76
      Mechanics:
      - CustomSound{sound=misc.tf2_die, volume=1}
      - Firework{effects=[{shape=STAR, color=RED, trail=TRUE, flicker=TRUE}]} @Target{}
    Mechanics:
    - CustomSound{sound=misc.hitmarker, volume=1}
    - CustomSound{sound=misc.hitmarker, volume=1}
    - Push{speed=1} @Target{}
    - Command{command=eco give <source_name> 1, console=true}
      
  Reload:
    Trigger:
      Main_Hand: drop_item
    Magazine_Size: 5
    Reload_Duration: 100
    Start_Mechanics:
    - Sound{sound=BLOCK_NOTE_BLOCK_HAT, volume=1, pitch=1}
    
    - Sound{sound=BLOCK_NOTE_BLOCK_HAT, volume=1, pitch=0.5, delayBeforePlay=20}
    - Sound{sound=BLOCK_PISTON_CONTRACT, volume=1, pitch=2, delayBeforePlay=22}
    
    - Sound{sound=ITEM_FLINTANDSTEEL_USE, volume=1, pitch=1, delayBeforePlay=32}
    - Sound{sound=BLOCK_WOODEN_DOOR_OPEN, volume=1, pitch=2, delayBeforePlay=36}
        
    - Sound{sound=ITEM_FLINTANDSTEEL_USE, volume=1, pitch=1, delayBeforePlay=83}
    - Sound{sound=ENTITY_PLAYER_HURT, volume=1, pitch=0.5, delayBeforePlay=83}
    - Sound{sound=BLOCK_WOODEN_DOOR_CLOSE, volume=1, pitch=2, delayBeforePlay=84}
    
    - Sound{sound=BLOCK_PISTON_EXTEND, volume=1, pitch=2, delayBeforePlay=99}
    
